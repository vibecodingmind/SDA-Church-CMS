services:
  admin:
    build: ./admin
    ports:
      - "3002:80"
    depends_on:
      - app

  app:
    build: .
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/church_cms
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars}
      NODE_ENV: production
      CORS_ORIGINS: http://localhost:3000,http://localhost:3002,http://localhost:5173,http://localhost:3001
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    command: sh -c "npx prisma migrate deploy && node dist/src/main.js"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: church_cms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
